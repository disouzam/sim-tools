# This workflow will upload a Python Package using Trusted Publishing when a release is created
# For more information see:
# https://docs.pypi.org/trusted-publishers/using-a-publisher/
#
# Modified 17/05/24 to use pyproject.toml and hatch
# Modified 21/01/26 to update gh action to publish to PyPI via Trusted Publishing

name: Upload Python Package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # required for PyPI Trusted Publishing

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatch

      - name: Build package
        run: hatch build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
